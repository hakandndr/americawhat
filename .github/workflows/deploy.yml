name: Deploy to Hostinger

on:
  push:
    branches: [main]
    paths-ignore:
      - 'src/data/pending.json'
      - 'src/data/seen_ids.json'
  workflow_dispatch:

# Only one deploy at a time; a newer push cancels older queued/running deploys
# so the LATEST commit always wins (prevents out-of-order overwrites).
concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate OG images
        run: |
          pip install pillow
          python scripts/gen-og.py
      - run: npm run build
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          exclude: |
            **/.git*/**
            **/node_modules/**
            **/aw_votes.json
            **/config.php